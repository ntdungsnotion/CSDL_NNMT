<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quản trị – BC định kỳ NN và MT</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="db.js"></script>
<script src="utils.js"></script>
<style>
:root{--xd:#1b4332;--xc:#2d6a4f;--xn:#52b788;--xp:#d8f3dc;--w:#fff;--g1:#f4f6f5;--g2:#e4e9e6;--g3:#c5d0c9;--g4:#7a9485;--g5:#3d5247;--dk:#1a2e22;--red:#c0392b;--yellow:#d97706;--blue:#1e40af;--sw:210px;--font:'Be Vietnam Pro',sans-serif;--mono:'JetBrains Mono',monospace;--r:7px;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);font-size:14px;color:var(--dk);background:var(--g1);height:100vh;overflow:hidden}
#app{display:flex;height:100vh}
.sb{width:var(--sw);background:var(--xd);display:flex;flex-direction:column;flex-shrink:0}
.sb-head{padding:14px 12px;border-bottom:1px solid rgba(255,255,255,.08)}
.sb-logo{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.sb-logo .i{font-size:20px}.sb-logo .t{font-size:11px;font-weight:700;color:white;line-height:1.35}
.sb-user{background:rgba(255,255,255,.07);border-radius:var(--r);padding:8px 10px}
.sb-user .n{font-size:12px;font-weight:700;color:white}.sb-user .r{font-size:10px;color:rgba(255,255,255,.5);margin-top:1px}
.sb-nav{flex:1;overflow-y:auto;padding:10px 8px}
.nlbl{font-size:10px;font-weight:700;color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:.8px;padding:8px 8px 3px}
.ni{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:6px;cursor:pointer;color:rgba(255,255,255,.65);font-size:12px;font-weight:500;transition:.15s;margin-bottom:1px}
.ni:hover{background:rgba(255,255,255,.08);color:white}
.ni.act{background:linear-gradient(135deg,var(--xc),#40916c);color:white}
.ni .i{font-size:14px;width:17px;text-align:center}
.sb-foot{padding:8px;border-top:1px solid rgba(255,255,255,.07)}
.sb-btn{width:100%;padding:7px;background:rgba(255,255,255,.06);border:none;border-radius:6px;color:rgba(255,255,255,.6);font-family:var(--font);font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;transition:.15s;margin-bottom:5px}
.sb-btn:hover{background:rgba(255,255,255,.12);color:white}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:50px;background:white;border-bottom:1px solid var(--g2);display:flex;align-items:center;padding:0 18px;flex-shrink:0;box-shadow:0 1px 4px rgba(0,0,0,.07)}
.topbar-t{font-size:14px;font-weight:700;color:var(--xd)}
.content{flex:1;overflow:auto;padding:16px}
.content::-webkit-scrollbar{width:6px}.content::-webkit-scrollbar-thumb{background:var(--g3);border-radius:3px}
.card{background:white;border-radius:var(--r);box-shadow:0 1px 4px rgba(0,0,0,.08);overflow:hidden;margin-bottom:14px}
.card-head{padding:12px 16px;border-bottom:1px solid var(--g2);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.card-head h3{font-size:14px;font-weight:700;color:var(--xd)}
.filter-bar{padding:10px 16px;background:var(--g1);border-bottom:1px solid var(--g2);display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.filter-bar label{font-size:12px;color:var(--g5);font-weight:600}
.filter-bar select,.filter-bar input[type=number]{padding:5px 8px;border:1.5px solid var(--g2);border-radius:5px;font-family:var(--font);font-size:12px;outline:none;background:white}
.filter-bar select:focus,.filter-bar input:focus{border-color:var(--xc)}
table.dt{width:100%;border-collapse:collapse;font-size:13px}
table.dt thead th{background:var(--g1);padding:8px 12px;text-align:left;font-size:11px;font-weight:700;color:var(--g5);text-transform:uppercase;letter-spacing:.4px;border-bottom:1px solid var(--g2);white-space:nowrap;cursor:pointer;user-select:none}
table.dt thead th:hover{background:var(--g2)}
table.dt thead th .sort-icon{margin-left:4px;opacity:.5}
table.dt thead th.sort-asc .sort-icon::after{content:'↑'}
table.dt thead th.sort-desc .sort-icon::after{content:'↓'}
table.dt thead th:not(.sort-asc):not(.sort-desc) .sort-icon::after{content:'↕'}
table.dt td{padding:8px 12px;border-bottom:1px solid var(--g2)}
table.dt tr:last-child td{border-bottom:none}
table.dt tr:hover td{background:#f7faf8}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600}
.badge.green{background:#d1fae5;color:#065f46}.badge.red{background:#fee2e2;color:#991b1b}
.badge.blue{background:#dbeafe;color:var(--blue)}.badge.gray{background:var(--g2);color:var(--g5)}
.badge.yellow{background:#fef3c7;color:#92400e}
.btn{padding:6px 12px;border:none;border-radius:6px;font-family:var(--font);font-size:12px;font-weight:600;cursor:pointer;transition:.15s}
.btn.primary{background:var(--xc);color:white}.btn.primary:hover{opacity:.85}
.btn.danger{background:#fee2e2;color:var(--red)}.btn.danger:hover{background:#fecaca}
.btn.ghost{background:var(--g2);color:var(--g5)}.btn.ghost:hover{background:var(--g3)}
.btn.yellow{background:#fef3c7;color:#92400e}.btn.yellow:hover{background:#fde68a}
.fg{display:flex;flex-direction:column;gap:4px}
.fg label,.lbl{font-size:11px;font-weight:700;color:var(--g5);text-transform:uppercase;letter-spacing:.3px}
.inp{width:100%;padding:8px 10px;border:1.5px solid var(--g2);border-radius:var(--r);font-family:var(--font);font-size:13px;outline:none;transition:.2s;color:var(--dk)}
.inp:focus{border-color:var(--xc);box-shadow:0 0 0 3px rgba(45,106,79,.1)}
.form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;padding:14px 16px}
.form-actions{padding:10px 16px;border-top:1px solid var(--g2);display:flex;gap:8px}
.sw-wrap{display:flex;align-items:center;gap:6px}
.sw{position:relative;width:36px;height:20px;cursor:pointer}
.sw input{opacity:0;width:0;height:0}
.sw-slider{position:absolute;inset:0;background:var(--g3);border-radius:20px;transition:.2s}
.sw input:checked+.sw-slider{background:var(--xn)}
.sw-slider::before{content:'';position:absolute;width:14px;height:14px;left:3px;top:3px;background:white;border-radius:50%;transition:.2s}
.sw input:checked+.sw-slider::before{transform:translateX(16px)}
.sw-lbl{font-size:12px;color:var(--g5)}
.err-txt{color:var(--red);font-size:12px;min-height:16px}
.mono{font-family:var(--mono);font-size:12px}
.loading{display:flex;align-items:center;justify-content:center;gap:8px;padding:32px;color:var(--g4);font-size:13px}
.spin{width:16px;height:16px;border:2px solid var(--g2);border-top-color:var(--xc);border-radius:50%;animation:sp .6s linear infinite;display:inline-block}
@keyframes sp{to{transform:rotate(360deg)}}
.empty{display:flex;flex-direction:column;align-items:center;padding:40px;color:var(--g4);gap:8px;font-size:13px}.empty .i{font-size:30px}
.toast{position:fixed;top:58px;right:14px;padding:10px 15px;border-radius:var(--r);font-size:13px;color:white;box-shadow:0 2px 10px rgba(0,0,0,.15);transform:translateX(110%);transition:.3s;z-index:200}
.toast.on{transform:translateX(0)}.toast.ok{background:#1b5e20}.toast.er{background:var(--red)}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:300;align-items:center;justify-content:center}
.modal-bg.on{display:flex}
.mbox{background:white;border-radius:14px;padding:24px;min-width:320px;max-width:500px;width:90%;box-shadow:0 8px 28px rgba(0,0,0,.2);max-height:90vh;overflow-y:auto}
.mbox h3{color:var(--xd);margin-bottom:5px}.mbox p{font-size:12px;color:var(--g4);margin-bottom:14px}
.mrow{display:flex;flex-direction:column;gap:10px;margin-bottom:14px}.mbtns{display:flex;gap:8px}
.btn-p{padding:8px 18px;background:var(--xc);color:white;border:none;border-radius:6px;font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer}
.btn-g{padding:8px 14px;background:var(--g2);color:var(--g5);border:none;border-radius:6px;font-family:var(--font);font-size:13px;cursor:pointer}
.num-inp{width:60px;padding:4px 6px;border:1.5px solid var(--g2);border-radius:5px;font-family:var(--mono);font-size:12px;text-align:center;outline:none}
.num-inp:focus{border-color:var(--xc)}
</style>
</head>
<body>
<div id="app">
  <aside class="sb">
    <div class="sb-head">
      <div class="sb-logo"><span class="i">⚙️</span>
        <div class="t">Quản trị<br><span style="opacity:.55;font-weight:400">BC định kỳ NN & MT</span></div>
      </div>
      <div class="sb-user">
        <div class="n" id="sb-name">Đang tải...</div>
        <div class="r" id="sb-role"></div>
      </div>
    </div>
    <nav class="sb-nav" id="sb-nav"></nav>
    <div class="sb-foot">
      <button class="sb-btn" onclick="window.close()">✕ Đóng trang này</button>
    </div>
  </aside>
  <main class="main">
    <div class="topbar"><div class="topbar-t" id="topbar-t">Quản trị hệ thống</div></div>
    <div class="content" id="content"><div class="loading"><span class="spin"></span> Đang tải...</div></div>
  </main>
</div>
<div class="toast" id="toast"></div>

<!-- Modal xác nhận -->
<div class="modal-bg" id="modal-xn">
  <div class="mbox">
    <h3 id="xn-title">Xác nhận</h3><p id="xn-msg"></p>
    <div class="mbtns">
      <button class="btn danger" id="xn-ok">Xác nhận</button>
      <button class="btn ghost" onclick="UTILS.dongModal('modal-xn')">Huỷ</button>
    </div>
  </div>
</div>

<!-- Modal thêm/sửa kỳ -->
<div class="modal-bg" id="modal-ky">
  <div class="mbox">
    <h3 id="ky-modal-title">Thêm kỳ báo cáo</h3>
    <p>Mã kỳ tự động sinh — bạn có thể chỉnh lại.</p>
    <div class="mrow">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div class="fg"><label>Tháng</label>
          <input class="inp" id="ky-thang" type="number" min="1" max="12" placeholder="3"
            oninput="sinhMaKy()"></div>
        <div class="fg"><label>Năm</label>
          <input class="inp" id="ky-nam" type="number" placeholder="2026"
            oninput="sinhMaKy()"></div>
      </div>
      <div class="fg"><label>Loại số liệu</label>
        <select class="inp" id="ky-loai" onchange="sinhMaKy()">
          <option value="Ước thực hiện">Ước thực hiện</option>
          <option value="Ước lũy kế">Ước lũy kế</option>
          <option value="Chính thức">Chính thức</option>
          <option value="Lũy kế chính thức">Lũy kế chính thức</option>
          <option value="So cùng kỳ">So cùng kỳ</option>
        </select></div>
      <div class="fg"><label>Mã kỳ <span style="color:var(--g4);font-weight:400">(tự sinh, có thể sửa)</span></label>
        <input class="inp mono" id="ky-ma" type="text" placeholder="uoc_03/2026"></div>
      <div class="fg"><label>Tên kỳ đầy đủ</label>
        <input class="inp" id="ky-ten" type="text" placeholder="Ước tháng 3 năm 2026"></div>
      <div class="fg"><label>Nguồn số liệu mặc định</label>
        <input class="inp" id="ky-nguon" type="text" placeholder="Dữ liệu ngành"></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div class="fg"><label>Thứ tự hiển thị</label>
          <input class="inp" id="ky-thutu" type="number" placeholder="1" min="1"></div>
        <div class="fg"><label>Độ rộng cột (px)</label>
          <input class="inp" id="ky-dorong" type="number" placeholder="120" min="60" max="300"></div>
      </div>
    </div>
    <div class="mbtns">
      <button class="btn-p" onclick="ADMIN.luuKy()">💾 Lưu kỳ</button>
      <button class="btn-g" onclick="UTILS.dongModal('modal-ky')">Huỷ</button>
    </div>
    <div class="err-txt" id="err-ky" style="margin-top:8px"></div>
  </div>
</div>

<!-- Modal thêm/sửa tài khoản -->
<div class="modal-bg" id="modal-tk">
  <div class="mbox">
    <h3 id="tk-modal-title">Thêm tài khoản</h3>
    <p>Mật khẩu mặc định: <strong id="mk-mac-admin"></strong></p>
    <div class="mrow">
      <div class="fg"><label>Tên đơn vị / phòng ban</label>
        <input class="inp" id="tk-donvi" placeholder="Chi cục Thủy sản"></div>
      <div class="fg"><label>Họ tên người phụ trách</label>
        <input class="inp" id="tk-hoten" placeholder="Nguyễn Văn A"></div>
      <div class="fg"><label>Email (tuỳ chọn)</label>
        <input class="inp" id="tk-email" type="email" placeholder="a@sonmt.gov.vn"></div>
      <div class="fg"><label>Vai trò</label>
        <select class="inp" id="tk-vaitro">
          <option value="editor">Người nhập liệu (Editor)</option>
          <option value="admin">Quản trị viên (Admin)</option>
        </select></div>
    </div>
    <div class="mbtns">
      <button class="btn-p" onclick="ADMIN.luuTK()">💾 Lưu</button>
      <button class="btn-g" onclick="UTILS.dongModal('modal-tk')">Huỷ</button>
    </div>
    <div class="err-txt" id="err-tk" style="margin-top:8px"></div>
  </div>
</div>

<!-- Modal phân quyền -->
<div class="modal-bg" id="modal-pq">
  <div class="mbox">
    <h3 id="pq-title">Phân quyền bảng</h3><p id="pq-sub"></p>
    <div id="pq-list" style="display:flex;flex-direction:column;gap:8px;margin-bottom:14px"></div>
    <div class="mbtns">
      <button class="btn-p" onclick="ADMIN.luuPQ()">💾 Lưu phân quyền</button>
      <button class="btn-g" onclick="UTILS.dongModal('modal-pq')">Đóng</button>
    </div>
  </div>
</div>

<script>
// Tham chiếu UTILS.xacNhan
const xacNhan = (t,m,cb) => UTILS.xacNhan(t,m,cb);
const toast = (m,t) => UTILS.toast(m,t);

let user=null, dsKy=[], dsTK=[], dsBang=[], editKyId=null, editTKId=null, pqTKId=null;
let sortCol='', sortDir=1; // sort kỳ báo cáo

// ── INIT ──
window.addEventListener('load', async () => {
  const sv = UTILS.laySession();
  if (!sv) { alert('Vui lòng đăng nhập từ trang chính!'); window.close(); return; }
  user = sv;
  document.getElementById('sb-name').textContent = user.don_vi;
  document.getElementById('sb-role').textContent = user.vai_tro==='admin'?'⚙️ Quản trị viên':'✏️ Người nhập liệu';
  document.getElementById('mk-mac-admin').textContent = CONFIG.MAT_KHAU_MAC_DINH;

  if (user.vai_tro === 'admin') {
    buildMenuAdmin();
    await Promise.all([loadKy(), loadTK(), loadBang()]);
    hienKyBaoCao();
  } else {
    buildMenuUser();
    hienDoiPass();
  }
});

function buildMenuAdmin() {
  document.getElementById('sb-nav').innerHTML = `
    <div class="nlbl">Quản lý</div>
    <div class="ni act" id="ni-ky" onclick="hienKyBaoCao()"><span class="i">📅</span> Kỳ báo cáo</div>
    <div class="ni" id="ni-tk" onclick="hienTaiKhoan()"><span class="i">👤</span> Tài khoản</div>
    <div class="ni" id="ni-pq" onclick="hienPhanQuyen()"><span class="i">🔑</span> Phân quyền</div>
    <div class="ni" id="ni-ct" onclick="hienChiTieu()"><span class="i">📑</span> Chỉ tiêu</div>
    <div class="ni" id="ni-bang" onclick="hienQuanLyBang()"><span class="i">🗂️</span> Quản lý bảng</div>
    <div class="ni" id="ni-tdb" onclick="hienTieuDeBang()"><span class="i">🏷️</span> Tiêu đề bảng</div>
    <div class="nlbl">Tài khoản</div>
    <div class="ni" onclick="hienDoiPass()"><span class="i">🔐</span> Đổi mật khẩu</div>`;
}
function buildMenuUser() {
  document.getElementById('sb-nav').innerHTML = `
    <div class="nlbl">Tài khoản</div>
    <div class="ni act" onclick="hienDoiPass()"><span class="i">🔐</span> Đổi mật khẩu</div>`;
}
function setAct(id) { document.querySelectorAll('.ni').forEach(e=>e.classList.remove('act')); document.getElementById(id)?.classList.add('act'); }

async function loadKy(namBD, namKT) { dsKy = await DB.layTatCaKy(namBD, namKT); }
async function loadTK() { dsTK = await DB.layTatCaTaiKhoan(); }
async function loadBang() { dsBang = await DB.layTatCaBang(); }

// ── KỲ BÁO CÁO ──
let filterNamBD = '', filterNamKT = '';

async function hienKyBaoCao() {
  setAct('ni-ky');
  document.getElementById('topbar-t').textContent = 'Quản lý kỳ báo cáo';
  const namHienTai = new Date().getFullYear();
  if (!filterNamBD) filterNamBD = namHienTai - 1;
  if (!filterNamKT) filterNamKT = namHienTai + 1;
  await loadKy(filterNamBD, filterNamKT);
  renderKyBaoCao();
}

function renderKyBaoCao() {
  let ds = [...dsKy];
  // Sort
  if (sortCol) {
    ds.sort((a,b) => {
      let va = a[sortCol], vb = b[sortCol];
      if (va === null || va === undefined) va = '';
      if (vb === null || vb === undefined) vb = '';
      return String(va).localeCompare(String(vb), 'vi') * sortDir;
    });
  }

  const cols = [
    { key:'thu_tu_hien_thi', label:'Thứ tự', w:'70px' },
    { key:'ky_bao_cao',      label:'Mã kỳ',  w:'160px' },
    { key:'ky_bao_cao_tieu_de', label:'Tên kỳ', w:'' },
    { key:'thang_bao_cao',   label:'Tháng',  w:'60px' },
    { key:'nam_bao_cao',     label:'Năm',    w:'65px' },
    { key:'loai_so_lieu',    label:'Loại',   w:'120px' },
    { key:'do_rong_cot',     label:'Rộng(px)',w:'80px' },
  ];

  const thead = cols.map(c => {
    const cls = sortCol===c.key ? (sortDir===1?'sort-asc':'sort-desc') : '';
    return `<th class="${cls}" style="${c.w?'width:'+c.w:''}" onclick="doSort('${c.key}')">${c.label}<span class="sort-icon"></span></th>`;
  }).join('') + '<th style="text-align:center">Nhập</th><th style="text-align:center">Hiện</th><th></th>';

  const tbody = ds.map(k => `<tr>
    <td style="text-align:center;padding:4px 8px">
      <input class="num-inp" type="number" min="1" value="${k.thu_tu_hien_thi||''}" placeholder="--"
        onchange="capNhatKyField('${k.ky_bao_cao}','thu_tu_hien_thi',this.value===''?null:parseInt(this.value))">
    </td>
    <td class="mono">${k.ky_bao_cao}</td>
    <td>${k.ky_bao_cao_tieu_de||''}</td>
    <td style="text-align:center">${k.thang_bao_cao}</td>
    <td style="text-align:center">${k.nam_bao_cao}</td>
    <td><span class="badge ${k.loai_so_lieu==='Chính thức'||k.loai_so_lieu==='Lũy kế chính thức'?'green':'blue'}">${k.loai_so_lieu||'--'}</span></td>
    <td style="text-align:center;padding:4px 8px">
      <input class="num-inp" type="number" min="60" max="400" value="${k.do_rong_cot||120}" placeholder="120"
        onchange="capNhatKyField('${k.ky_bao_cao}','do_rong_cot',parseInt(this.value)||120)">
    </td>
    <td style="text-align:center">
      <label class="sw-wrap" style="justify-content:center">
        <label class="sw"><input type="checkbox" ${!k.khoa_nhap_lieu?'checked':''}
          onchange="capNhatKyField('${k.ky_bao_cao}','khoa_nhap_lieu',!this.checked)">
          <span class="sw-slider"></span></label>
        <span class="sw-lbl" style="font-size:10px">${!k.khoa_nhap_lieu?'🔓':'🔒'}</span>
      </label>
    </td>
    <td style="text-align:center">
      <label class="sw-wrap" style="justify-content:center">
        <label class="sw"><input type="checkbox" ${k.dua_vao_bieu_bao_cao?'checked':''}
          onchange="capNhatKyField('${k.ky_bao_cao}','dua_vao_bieu_bao_cao',this.checked)">
          <span class="sw-slider"></span></label>
        <span class="sw-lbl" style="font-size:10px">${k.dua_vao_bieu_bao_cao?'✅':'⬜'}</span>

// Tự sinh mã kỳ
function sinhMaKy() {
  const thang = document.getElementById('ky-thang').value;
  const nam   = document.getElementById('ky-nam').value;
  const loai  = document.getElementById('ky-loai').value;
  if (!thang || !nam) return;
  const t = String(thang).padStart(2,'0');
  const prefix = {
    'Ước thực hiện': 'uoc',
    'Ước lũy kế':    'uoclk',
    'Chính thức':    'ct',
    'Lũy kế chính thức': 'lkct',
    'So cùng kỳ':   'sck',
  }[loai] || 'uoc';
  document.getElementById('ky-ma').value = `${prefix}_${t}/${nam}`;
  // Sinh tên đầy đủ
  const tenLoai = {
    'Ước thực hiện': `Ước tháng ${thang} năm ${nam}`,
    'Ước lũy kế':   `Ước lũy kế đến tháng ${thang} năm ${nam}`,
    'Chính thức':   `Chính thức tháng ${thang} năm ${nam}`,
    'Lũy kế chính thức': `Lũy kế chính thức đến tháng ${thang} năm ${nam}`,
    'So cùng kỳ':   `So cùng kỳ tháng ${thang} năm ${nam}`,
  }[loai] || '';
  if (!document.getElementById('ky-ten').value || document.getElementById('ky-ten').dataset.auto==='1') {
    document.getElementById('ky-ten').value = tenLoai;
    document.getElementById('ky-ten').dataset.auto = '1';
  }
}

const ADMIN = {
  moModalKy(maKy=null) {
    editKyId = maKy;
    const k = maKy ? dsKy.find(x=>x.ky_bao_cao===maKy) : null;
    document.getElementById('ky-modal-title').textContent = k ? 'Sửa kỳ báo cáo' : 'Thêm kỳ báo cáo';
    document.getElementById('ky-thang').value  = k?.thang_bao_cao || '';
    document.getElementById('ky-nam').value    = k?.nam_bao_cao   || new Date().getFullYear();
    document.getElementById('ky-loai').value   = k?.loai_so_lieu  || 'Ước thực hiện';
    document.getElementById('ky-ma').value     = k?.ky_bao_cao    || '';
    document.getElementById('ky-ten').value    = k?.ky_bao_cao_tieu_de || '';
    document.getElementById('ky-ten').dataset.auto = '0';
    document.getElementById('ky-nguon').value  = k?.nguon_so_lieu || '';
    document.getElementById('ky-thutu').value  = k?.thu_tu_hien_thi || '';
    document.getElementById('ky-dorong').value = k?.do_rong_cot  || 120;
    document.getElementById('err-ky').textContent = '';
    if (!k) sinhMaKy();
    UTILS.moModal('modal-ky');
  },

  async luuKy() {
    const ma    = document.getElementById('ky-ma').value.trim();
    const ten   = document.getElementById('ky-ten').value.trim();
    const thang = parseInt(document.getElementById('ky-thang').value);
    const nam   = parseInt(document.getElementById('ky-nam').value);
    const loai  = document.getElementById('ky-loai').value;
    const nguon = document.getElementById('ky-nguon').value.trim();
    const thutu = document.getElementById('ky-thutu').value;
    const dorong= parseInt(document.getElementById('ky-dorong').value)||120;
    const err   = document.getElementById('err-ky');
    err.textContent = '';
    if (!ma||!ten||!thang||!nam) { err.textContent='Vui lòng điền đủ thông tin!'; return; }
    const row = {
      ky_bao_cao: ma, ky_bao_cao_tieu_de: ten,
      thang_bao_cao: thang, nam_bao_cao: nam,
      loai_so_lieu: loai, nguon_so_lieu: nguon,
      thu_tu_hien_thi: thutu?parseInt(thutu):null,
      do_rong_cot: dorong,
      khoa_nhap_lieu: false, dua_vao_bieu_bao_cao: true
    };
    try {
      if (editKyId) await DB.capNhatKy(editKyId, row);
      else await DB.themKy(row);
      UTILS.dongModal('modal-ky');
      toast('✅ Đã lưu kỳ báo cáo!');
      await hienKyBaoCao();
    } catch(e) { err.textContent = 'Lỗi: ' + e.message; }
  },

  // ── TÀI KHOẢN ──
  moModalTK(id=null) {
    editTKId = id;
    const r = id ? dsTK.find(x=>x.id===id) : null;
    document.getElementById('tk-modal-title').textContent = r ? 'Sửa tài khoản' : 'Thêm tài khoản';
    document.getElementById('tk-donvi').value   = r?.don_vi   || '';
    document.getElementById('tk-hoten').value   = r?.ho_ten   || '';
    document.getElementById('tk-email').value   = r?.email    || '';
    document.getElementById('tk-vaitro').value  = r?.vai_tro  || 'editor';
    document.getElementById('err-tk').textContent = '';
    UTILS.moModal('modal-tk');
  },

  async luuTK() {
    const dv = document.getElementById('tk-donvi').value.trim();
    const ht = document.getElementById('tk-hoten').value.trim();
    const em = document.getElementById('tk-email').value.trim();
    const vt = document.getElementById('tk-vaitro').value;
    const err = document.getElementById('err-tk');
    err.textContent = '';
    if (!dv||!ht) { err.textContent='Vui lòng điền đơn vị và họ tên!'; return; }
    const row = { don_vi:dv, ho_ten:ht, email:em||null, vai_tro:vt };
    try {
      if (editTKId) await DB.suaTaiKhoan(editTKId, row);
      else await DB.themTaiKhoan({...row, mat_khau:CONFIG.MAT_KHAU_MAC_DINH, trang_thai:true});
      UTILS.dongModal('modal-tk');
      toast('✅ Đã lưu tài khoản!');
      await hienTaiKhoan();
    } catch(e) { err.textContent='Lỗi: '+e.message; }
  },

  async luuPQ() {
    const checked = dsBang.filter(b=>document.getElementById('pq-'+b.bang)?.checked).map(b=>b.bang);
    try {
      await DB.luuPhanQuyen(pqTKId, checked);
      UTILS.dongModal('modal-pq');
      toast('✅ Đã lưu phân quyền!');
      await hienPhanQuyen();
    } catch(e) { toast('Lỗi: '+e.message,'er'); }
  },
};

              <input type="text" value="${b.ten_bang||''}"

                onfocus="this.style.borderColor='var(--xc)'" onblur="this.style.borderColor='var(--g2)'"
                onchange="luuTenBang('${b.bang}','ten_bang',this.value)">
            </td>
            <td>
              <input type="text" value="${b.don_vi_bao_cao||''}"
                style="width:100%;padding:4px 8px;border:1.5px solid var(--g2);border-radius:5px;font-family:var(--font);font-size:12px;outline:none"
                onfocus="this.style.borderColor='var(--xc)'" onblur="this.style.borderColor='var(--g2)'"
                onchange="luuTenBang('${b.bang}','don_vi_bao_cao',this.value)">
            </td>
            <td style="text-align:center;padding:4px 6px">
              <input class="num-inp" type="number" min="80" max="600" value="${b.do_rong_ten||280}"
                onchange="luuDoRongBang('${b.bang}','do_rong_ten',parseInt(this.value)||280)">
            </td>
            <td style="text-align:center;padding:4px 6px">
              <input class="num-inp" type="number" min="40" max="150" value="${b.do_rong_dvt||70}"
                onchange="luuDoRongBang('${b.bang}','do_rong_dvt',parseInt(this.value)||70)">
            </td>
            <td style="text-align:center;padding:4px 6px">
              <input class="num-inp" type="number" min="80" max="300" value="${b.do_rong_ghichu||140}"
                onchange="luuDoRongBang('${b.bang}','do_rong_ghichu',parseInt(this.value)||140)">
            </td>
            <td class="mono" style="font-size:10px;color:var(--g4)">${(CONFIG.BANG.CSDL_PREFIX+b.bang).toLowerCase()}</td>
            <td style="white-space:nowrap">
              <button class="btn danger" style="padding:4px 8px" onclick="xoaBang('${b.bang}','${b.ten_bang}')">🗑 Xoá</button>
            </td>
          </tr>`).join('')}</tbody>
        </table>
      </div>
    </div>
    <div style="background:#fff8e1;border:1px solid #ffe082;border-radius:var(--r);padding:10px 14px;font-size:12px;color:#6d4c00">
      ⚠️ <strong>Trước khi thêm bảng:</strong> chạy SQL tạo bảng dữ liệu trong Supabase trước:<br>
      <code style="background:#fef3c7;padding:2px 6px;border-radius:3px;font-size:11px">
        CREATE TABLE csdl_bang_06 (LIKE csdl_bang_01 INCLUDING ALL);
      </code>
    </div>`;
}

// Modal thêm bảng mới
function moModalThemBang() {
  // Tính mã bảng tiếp theo
  const soBang = dsBang.length + 1;
  const maMoi  = `Bang_${String(soBang).padStart(2,'0')}`;
  const thuTu  = soBang;

  UTILS.xacNhan(
    '+ Thêm bảng báo cáo mới',
    `<div style="display:flex;flex-direction:column;gap:10px;margin-top:10px">
      <div><label style="font-size:11px;font-weight:700;color:var(--g5);display:block;margin-bottom:4px">MÃ BẢNG</label>
        <input id="nb-ma" type="text" value="${maMoi}" style="width:100%;padding:8px 10px;border:1.5px solid var(--g2);border-radius:7px;font-family:monospace;font-size:13px;outline:none">
        <div style="font-size:11px;color:var(--g4);margin-top:3px">Bảng DB sẽ là: <strong id="nb-db-preview">${(CONFIG.BANG.CSDL_PREFIX+maMoi).toLowerCase()}</strong></div>
      </div>
      <div><label style="font-size:11px;font-weight:700;color:var(--g5);display:block;margin-bottom:4px">TÊN BẢNG</label>
        <input id="nb-ten" type="text" placeholder="VD: Lâm nghiệp" style="width:100%;padding:8px 10px;border:1.5px solid var(--g2);border-radius:7px;font-family:var(--font);font-size:13px;outline:none"></div>
      <div><label style="font-size:11px;font-weight:700;color:var(--g5);display:block;margin-bottom:4px">ĐƠN VỊ BÁO CÁO</label>
        <input id="nb-dv" type="text" placeholder="VD: Chi cục Kiểm lâm" style="width:100%;padding:8px 10px;border:1.5px solid var(--g2);border-radius:7px;font-family:var(--font);font-size:13px;outline:none"></div>
      <div style="background:#fff3cd;border:1px solid #ffc107;border-radius:6px;padding:8px 10px;font-size:11px;color:#856404">
        ⚠️ Phải tạo bảng DB trong Supabase trước:<br>
        <code id="nb-sql-preview">CREATE TABLE ${(CONFIG.BANG.CSDL_PREFIX+maMoi).toLowerCase()} (LIKE csdl_bang_01 INCLUDING ALL);</code>
      </div>
    </div>`,
    async () => {
      const ma  = document.getElementById('nb-ma')?.value.trim();
      const ten = document.getElementById('nb-ten')?.value.trim();
      const dv  = document.getElementById('nb-dv')?.value.trim();
      if (!ma || !ten) { toast('Vui lòng điền Mã bảng và Tên bảng!','er'); return; }
      try {
        await sb.from(CONFIG.BANG.DANH_SACH_BANG).insert({
          bang: ma, ten_bang: ten, don_vi_bao_cao: dv||'',
          thu_tu: thuTu, do_rong_ten: 280, do_rong_dvt: 70, do_rong_ghichu: 140
        });
        toast('✅ Đã thêm bảng ' + ten + '!');
        await loadBang();
        renderQuanLyBang();
      } catch(e) { toast('Lỗi: '+e.message,'er'); }
    }
  );
  // Cập nhật preview khi gõ mã
  setTimeout(()=>{
    const inp = document.getElementById('nb-ma');
    if(inp) inp.addEventListener('input', ()=>{
      const v = inp.value.trim();
      const db = (CONFIG.BANG.CSDL_PREFIX+v).toLowerCase();
      const prev = document.getElementById('nb-db-preview');
      const sql  = document.getElementById('nb-sql-preview');
      if(prev) prev.textContent = db;
      if(sql)  sql.textContent  = `CREATE TABLE ${db} (LIKE csdl_bang_01 INCLUDING ALL);`;
    });
  }, 100);
}

async function xoaBang(maBang, tenBang) {
  UTILS.xacNhan(
    '🗑 Xoá bảng báo cáo',
    `<p>Xoá bảng <strong>${tenBang}</strong> (<code>${maBang}</code>) khỏi danh sách?</p>
     <div style="background:#fee2e2;border:1px solid #fca5a5;border-radius:6px;padding:8px 10px;font-size:12px;color:#991b1b;margin-top:10px">
       ⚠️ Thao tác này chỉ xoá khỏi danh sách — <strong>không xoá bảng dữ liệu</strong> trong Supabase và <strong>không xoá chỉ tiêu</strong>.<br>
       Để xoá hoàn toàn, cần chạy SQL trong Supabase.
     </div>`,
    async () => {
      try {
        await sb.from(CONFIG.BANG.DANH_SACH_BANG).delete().eq('bang', maBang);
        toast('✅ Đã xoá bảng ' + tenBang + ' khỏi danh sách!');
        await loadBang();
        renderQuanLyBang();
      } catch(e) { toast('Lỗi: '+e.message,'er'); }
    }
  );
}

async function luuTenBang(maBang, col, val) {
  const u={}; u[col]=val;
  try { await DB.capNhatBang(maBang, u); toast('✅ Đã lưu!'); }
  catch(e) { toast('Lỗi: '+e.message,'er'); }
}

// ── TIÊU ĐỀ BẢNG ──
async function hienTieuDeBang() {
  setAct('ni-tdb');
  document.getElementById('topbar-t').textContent = 'Tiêu đề bảng báo cáo';
  await loadBang();
  document.getElementById('content').innerHTML = `
    <div class="card">
      <div class="card-head"><h3>🏷️ Tiêu đề các bảng báo cáo</h3></div>
      <div style="padding:14px 16px">
        <p style="font-size:12px;color:var(--g4);margin-bottom:14px">Dòng 1: tiêu đề chính (in đậm). Dòng 2: tiêu đề phụ (số công văn).</p>
        ${dsBang.map(b=>`
          <div style="border:1.5px solid var(--g2);border-radius:var(--r);padding:14px;margin-bottom:10px">
            <div style="font-size:13px;font-weight:700;color:var(--xd);margin-bottom:10px">📋 ${b.ten_bang}</div>
            <div style="display:grid;gap:8px">
              <div class="fg"><label>Tiêu đề chính (dòng 1)</label>
                <input id="td1-${b.bang}" class="inp" value="${b.tieu_de_chinh||b.ten_bang||''}" placeholder="VD: BẢNG THỦY SẢN"></div>
              <div class="fg"><label>Tiêu đề phụ (dòng 2)</label>
                <input id="td2-${b.bang}" class="inp" value="${b.tieu_de_phu||''}" placeholder="(Đính kèm Công văn số … của …)"></div>
              <div><button class="btn primary" onclick="luuTieuDe('${b.bang}')">💾 Lưu</button></div>
            </div>
          </div>`).join('')}
      </div>
    </div>`;
}
async function luuDoRongBang(maBang, col, val) {
  const u={}; u[col]=val;
  try { await DB.capNhatBang(maBang, u); toast('📐 Đã lưu độ rộng!'); }
  catch(e) { toast('Lỗi: '+e.message,'er'); }
}

async function luuTieuDe(maBang) {
  const td1 = document.getElementById('td1-'+maBang)?.value.trim()||'';
  const td2 = document.getElementById('td2-'+maBang)?.value.trim()||'';
  try { await DB.capNhatBang(maBang,{tieu_de_chinh:td1,tieu_de_phu:td2}); toast('✅ Đã lưu tiêu đề!'); }
  catch(e) { toast('Lỗi: '+e.message,'er'); }
}

// ── ĐỔI MẬT KHẨU ──
function hienDoiPass() {
  document.getElementById('topbar-t').textContent = 'Đổi mật khẩu';
  document.getElementById('content').innerHTML = `
    <div style="max-width:400px;margin:0 auto">
      <div class="card">
        <div class="card-head"><h3>🔐 Đổi mật khẩu</h3></div>
        <div class="form-grid" style="grid-template-columns:1fr">
          <div class="fg"><label>Đơn vị</label><input class="inp" value="${user.don_vi}" disabled style="background:var(--g1)"></div>
          <div class="fg"><label>Mật khẩu hiện tại</label><input class="inp" type="password" id="dp-cu" placeholder="••••••••"></div>
          <div class="fg"><label>Mật khẩu mới (≥4 ký tự)</label><input class="inp" type="password" id="dp-moi" placeholder="••••••••"></div>
          <div class="fg"><label>Nhập lại mật khẩu mới</label><input class="inp" type="password" id="dp-moi2" placeholder="••••••••"></div>
        </div>
        <div class="form-actions">
          <button class="btn primary" onclick="luuPassAdmin()">💾 Lưu mật khẩu</button>
        </div>
        <div class="err-txt" id="err-dp" style="padding:0 16px 12px"></div>
      </div>
    </div>`;
}
async function luuPassAdmin() {
  const cu=document.getElementById('dp-cu').value, moi=document.getElementById('dp-moi').value, moi2=document.getElementById('dp-moi2').value;
  const err=document.getElementById('err-dp'); err.textContent=''; err.style.color='var(--red)';
  if(cu!==(user.mat_khau||CONFIG.MAT_KHAU_MAC_DINH)){err.textContent='Mật khẩu hiện tại không đúng.';return}
  if(moi.length<4){err.textContent='Mật khẩu mới phải có ít nhất 4 ký tự.';return}
  if(moi!==moi2){err.textContent='Mật khẩu nhập lại không khớp.';return}
  if(moi===CONFIG.MAT_KHAU_MAC_DINH){err.textContent='Không được dùng lại mật khẩu mặc định.';return}
  try {
    await DB.doiMatKhau(user.id, moi);
    user.mat_khau=moi; UTILS.luuSession(user);
    err.style.color='var(--xc)'; err.textContent='✅ Đổi mật khẩu thành công!';
    ['dp-cu','dp-moi','dp-moi2'].forEach(id=>document.getElementById(id).value='');
  } catch(e){err.textContent='Lỗi: '+e.message}
}
</script>
</body>
</html>
