<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Xem báo cáo – NN và MT</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="db.js"></script>
<script src="utils.js"></script>
<style>
:root{--xd:#1b4332;--xc:#2d6a4f;--xn:#52b788;--xp:#d8f3dc;--w:#fff;--g1:#f4f6f5;--g2:#e4e9e6;--g3:#c5d0c9;--g4:#7a9485;--g5:#3d5247;--dk:#1a2e22;--red:#c0392b;--blue:#2563eb;--sw:230px;--font:'Be Vietnam Pro',sans-serif;--mono:'JetBrains Mono',monospace;--r:7px;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);font-size:14px;color:var(--dk);background:var(--g1);height:100vh;overflow:hidden}
#app{display:flex;height:100vh}

/* ── Sidebar ── */
.sb{width:var(--sw);background:var(--xd);display:flex;flex-direction:column;flex-shrink:0}
.sb-head{padding:13px 11px;border-bottom:1px solid rgba(255,255,255,.08)}
.sb-logo{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.sb-logo .i{font-size:20px}.sb-logo .t{font-size:11px;font-weight:700;color:white;line-height:1.35}
.sb-user{background:rgba(255,255,255,.07);border-radius:var(--r);padding:8px 10px}
.sb-user .n{font-size:12px;font-weight:700;color:white}.sb-user .r{font-size:10px;color:rgba(255,255,255,.5);margin-top:1px}
.sb-nav{flex:1;overflow-y:auto;padding:10px 8px}
.sb-nav::-webkit-scrollbar{width:3px}.sb-nav::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:2px}
.nlbl{font-size:10px;font-weight:700;color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:.8px;padding:8px 8px 3px}
.ni{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:6px;cursor:pointer;color:rgba(255,255,255,.65);font-size:12px;font-weight:500;transition:.15s;margin-bottom:1px}
.ni:hover{background:rgba(255,255,255,.08);color:white}
.ni.act{background:linear-gradient(135deg,var(--xc),#40916c);color:white;box-shadow:0 2px 6px rgba(0,0,0,.2)}
.ni .i{font-size:14px;width:17px;text-align:center;flex-shrink:0}
.sb-foot{padding:8px;border-top:1px solid rgba(255,255,255,.07);display:flex;flex-direction:column;gap:5px}
.sb-btn{width:100%;padding:7px 10px;background:rgba(255,255,255,.06);border:none;border-radius:6px;color:rgba(255,255,255,.6);font-family:var(--font);font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:.15s}
.sb-btn:hover{background:rgba(255,255,255,.12);color:white}
.sb-btn.back{background:rgba(82,183,136,.16);color:#95d5b2}.sb-btn.back:hover{background:rgba(82,183,136,.26);color:#d8f3dc}

/* ── Main ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{min-height:50px;background:white;border-bottom:1px solid var(--g2);display:flex;align-items:center;padding:0 18px;flex-shrink:0;box-shadow:0 1px 4px rgba(0,0,0,.07)}
.topbar-t{font-size:14px;font-weight:700;color:var(--xd);flex:1}
.topbar-s{font-size:11px;color:var(--g4);font-weight:400;margin-left:6px}
.content{flex:1;overflow:auto;padding:14px}
.content::-webkit-scrollbar{width:6px}.content::-webkit-scrollbar-thumb{background:var(--g3);border-radius:3px}

/* ── Thanh điều khiển ── */
.ctrl{background:white;border-radius:var(--r);padding:12px 15px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.ctrl-row{display:flex;align-items:flex-start;gap:16px;flex-wrap:wrap}
.ctrl-block{display:flex;flex-direction:column;gap:6px;min-width:0}
.ctrl-lbl{font-size:10px;font-weight:700;color:var(--g5);text-transform:uppercase;letter-spacing:.5px;display:flex;align-items:center;gap:5px}
.ctrl-lbl b{color:var(--xc)}
.sel{padding:7px 10px;border:1.5px solid var(--g2);border-radius:6px;font-family:var(--font);font-size:13px;outline:none;background:white;color:var(--dk);cursor:pointer;transition:.15s}
.sel:focus{border-color:var(--xc);box-shadow:0 0 0 3px rgba(45,106,79,.1)}
.ky-pick{display:flex;flex-wrap:wrap;gap:6px;max-width:640px}
.ky-chip{display:inline-flex;align-items:center;gap:6px;padding:5px 11px;border:1.5px solid var(--g2);border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;transition:.15s;background:white;color:var(--g5);user-select:none}
.ky-chip:hover{border-color:var(--xn);background:var(--g1)}
.ky-chip.on{background:var(--xd);border-color:var(--xd);color:white;font-weight:600}
.ky-chip .lock{opacity:.7;font-size:11px}
.ky-empty{font-size:12px;color:var(--g4);font-style:italic;padding:12px}
/* ── Danh sách kỳ dạng bảng có ô chọn ── */
.ky-box{border:1.5px solid var(--g2);border-radius:8px;overflow:hidden;max-width:680px}
.ky-box-h{display:flex;background:var(--xd);color:white;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.4px}
.ky-box-h .c-chk{width:64px;text-align:center;padding:8px 6px;border-right:1px solid rgba(255,255,255,.14)}
.ky-box-h .c-name{flex:1;padding:8px 12px}
.ky-list{max-height:196px;overflow-y:auto}
.ky-list::-webkit-scrollbar{width:9px}.ky-list::-webkit-scrollbar-thumb{background:var(--g3);border-radius:4px}.ky-list::-webkit-scrollbar-track{background:var(--g1)}
.ky-r{display:flex;align-items:stretch;border-bottom:1px solid var(--g2);cursor:pointer;transition:.12s;background:white}
.ky-r:last-child{border-bottom:none}
.ky-r:hover{background:var(--xp)}
.ky-r .c-chk{width:64px;display:flex;align-items:center;justify-content:center;padding:6px;border-right:1px solid var(--g2)}
.ky-r .c-name{flex:1;padding:7px 12px;font-size:13px;font-weight:500;color:var(--g5);display:flex;align-items:center;gap:8px}
.ky-r.added .c-name{color:var(--xc)}
.ky-cb{width:18px;height:18px;border:1.8px solid var(--g3);border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:white;background:white;flex-shrink:0;transition:.12s}
.ky-r.on .ky-cb{background:var(--xc);border-color:var(--xc)}
.ky-r .lock{opacity:.65;font-size:11px}
.added-badge{font-size:10px;font-weight:700;color:var(--xc);background:var(--xp);padding:2px 8px;border-radius:10px;margin-left:auto}
/* ── Chip "đã thêm vào biểu" ── */
.chip-strip{display:flex;flex-wrap:wrap;gap:7px;align-items:center;margin-top:2px}
.chip{display:inline-flex;align-items:center;gap:8px;padding:5px 12px;border-radius:20px;font-size:12px;font-weight:600}
.chip.ky{background:var(--xd);color:white}
.chip.cmp{background:#eff6ff;border:1.5px solid #bfdbfe;color:#1e40af}
.chip .x{cursor:pointer;font-weight:700;font-size:15px;line-height:1;opacity:.65}
.chip .x:hover{opacity:1}
.chip.ky .x:hover{color:#ffb4a2}.chip.cmp .x:hover{color:var(--red)}
.chip-none{font-size:12px;color:var(--g4);font-style:italic}
/* ── Nút Xem biểu ── */
.view-bar{display:flex;justify-content:center;padding-top:4px}
.btn-view{width:100%;max-width:360px;padding:13px 24px;background:linear-gradient(135deg,var(--xd),var(--xc));color:white;border:none;border-radius:10px;font-family:var(--font);font-size:15px;font-weight:700;cursor:pointer;transition:.2s;box-shadow:0 4px 14px rgba(27,67,50,.22);display:inline-flex;align-items:center;justify-content:center;gap:8px}
.btn-view:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(27,67,50,.3)}
.btn-view:disabled{background:var(--g3);color:var(--g5);cursor:not-allowed;box-shadow:none;transform:none}
.ctrl-note{font-size:12px;color:var(--g5);background:var(--xp);border:1px dashed var(--xn);border-radius:8px;padding:8px 13px;font-weight:500}
.sec{background:white;border-radius:var(--r);padding:13px 16px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.sec-title{font-size:11px;font-weight:700;color:var(--g5);text-transform:uppercase;letter-spacing:.5px;margin-bottom:11px;display:flex;align-items:center;gap:7px}
.sec-title .num{width:19px;height:19px;border-radius:50%;background:var(--xc);color:white;display:inline-flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0}
.qs-bar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;background:linear-gradient(135deg,#f0fdf4,var(--xp));border:1.5px solid var(--xn);border-radius:9px;padding:9px 13px;margin-bottom:13px;font-size:13px;color:var(--g5)}
.qs-lbl{font-weight:700;color:var(--xd)}
.qs-hint{font-size:11px;color:var(--g4);flex-basis:100%;font-style:italic}

/* ── Bảng so sánh (builder) ── */
.cmp{border-top:1px dashed var(--g2);margin-top:12px;padding-top:12px}
.cmp-form{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.cmp-form .op{font-weight:700;color:var(--xc);font-size:16px}
.btn-add{padding:7px 14px;background:var(--xn);color:white;border:none;border-radius:6px;font-family:var(--font);font-size:12px;font-weight:600;cursor:pointer;transition:.15s}
.btn-add:hover{background:var(--xc)}
.btn-add:disabled{background:var(--g3);cursor:not-allowed}
.cmp-list{display:flex;flex-wrap:wrap;gap:7px;margin-top:10px}
.cmp-tag{display:inline-flex;align-items:center;gap:8px;padding:5px 10px;background:#eff6ff;border:1.5px solid #bfdbfe;border-radius:6px;font-size:12px;color:#1e40af;font-weight:600}
.cmp-tag .x{cursor:pointer;color:#93a3c9;font-weight:700;font-size:14px;line-height:1}
.cmp-tag .x:hover{color:var(--red)}

/* ── Bảng dữ liệu ── */
.tieu-de-bang{background:white;border-radius:var(--r);padding:8px 16px;margin-bottom:8px;box-shadow:0 1px 4px rgba(0,0,0,.08);text-align:center}
.tieu-de-bang .d1{font-size:14px;font-weight:700;color:var(--xd);text-transform:uppercase}
.tieu-de-bang .d2{font-size:12px;color:var(--g4);margin-top:2px;font-style:italic}
.tw{background:white;border-radius:var(--r);box-shadow:0 1px 4px rgba(0,0,0,.08);overflow:auto;max-height:calc(100vh - 250px)}
.tw::-webkit-scrollbar{width:7px;height:7px}.tw::-webkit-scrollbar-thumb{background:var(--g3);border-radius:3px}
table.t{width:max-content;min-width:100%;border-collapse:collapse;font-size:13px}
table.t thead{position:sticky;top:0;z-index:10}
table.t th{background:var(--xd);color:white;padding:7px 9px;font-size:11px;font-weight:600;white-space:normal;word-break:break-word;border-right:1px solid rgba(255,255,255,.1);text-align:center;vertical-align:middle;line-height:1.35;position:relative}
.resize-handle{position:absolute;top:0;right:0;width:7px;height:100%;cursor:col-resize;user-select:none;z-index:20;touch-action:none}
.resize-handle:hover{background:rgba(255,255,255,.35)}
.resize-handle:active{background:rgba(255,255,255,.55)}
body.resizing{cursor:col-resize!important;user-select:none!important}
table.t th.th-n{text-align:left;min-width:260px;position:sticky;left:0;z-index:11;background:var(--xd);white-space:nowrap}
table.t th.th-stt{width:44px}table.t th.th-u{width:70px}
table.t th.th-ky{min-width:110px}
table.t th.th-cmp{background:#1e40af;min-width:120px}
table.t td{padding:4px 9px;border-bottom:1px solid var(--g2);border-right:1px solid var(--g2);vertical-align:middle}
table.t td.td-n{position:sticky;left:0;background:white;border-right:2px solid var(--g2);z-index:5;padding:5px 10px;white-space:normal;word-break:break-word;overflow-wrap:anywhere;line-height:1.4}
table.t td.td-stt{text-align:center;color:var(--g4);font-size:11px;font-family:var(--mono)}
table.t td.td-u{text-align:center;font-size:11px;color:var(--g4)}
table.t td.td-val{text-align:right;font-family:var(--mono);font-size:13px;color:var(--xd);white-space:nowrap}
table.t td.td-val.no-val{color:var(--g3)}
table.t td.td-cmp{text-align:right;font-family:var(--mono);font-size:13px;font-weight:600;background:#f5f8ff}
table.t td.td-cmp.up{color:#15803d}table.t td.td-cmp.down{color:var(--red)}table.t td.td-cmp.na{color:var(--g3);font-weight:400}
table.t tr.tr-h td{background:var(--xp);font-weight:700;color:var(--xd);font-size:12px}
table.t tr.tr-h td.td-n{background:var(--xp)}
table.t tr:not(.tr-h):hover td{background:#f0fdf4}table.t tr:not(.tr-h):hover td.td-n{background:#f0fdf4}

.btn-sm{padding:6px 13px;border:none;border-radius:6px;font-family:var(--font);font-size:12px;font-weight:600;cursor:pointer;transition:.15s;display:inline-flex;align-items:center;gap:5px}
.btn-sm.g{background:var(--xc);color:white}.btn-sm.g:hover{opacity:.88}
.btn-sm.gr{background:var(--g2);color:var(--g5)}.btn-sm.gr:hover{background:var(--g3)}
.empty{display:flex;flex-direction:column;align-items:center;padding:60px 20px;color:var(--g4);gap:10px;font-size:14px;text-align:center}.empty .i{font-size:40px}
/* ── Màn hình chào mừng (chưa chọn bảng) ── */
.welcome{display:flex;align-items:center;gap:30px;min-height:calc(100vh - 120px);padding:30px 24px;justify-content:center;flex-wrap:wrap}
.welcome-arrow{font-size:52px;color:var(--xn);animation:nudge 1.3s ease-in-out infinite;flex-shrink:0}
@keyframes nudge{0%,100%{transform:translateX(0);opacity:.55}50%{transform:translateX(-14px);opacity:1}}
.welcome-card{background:white;border-radius:18px;box-shadow:0 6px 30px rgba(27,67,50,.12);border:1px solid var(--g2);padding:40px 48px;max-width:540px;text-align:center;position:relative;overflow:hidden}
.welcome-card::before{content:"";position:absolute;top:0;left:0;right:0;height:6px;background:linear-gradient(90deg,var(--xd),var(--xn),var(--xc))}
.welcome-ico{width:88px;height:88px;margin:8px auto 6px;border-radius:24px;background:linear-gradient(135deg,var(--xp),#95d5b2);display:flex;align-items:center;justify-content:center;font-size:46px;box-shadow:0 6px 20px rgba(82,183,136,.32)}
.welcome-card h2{font-size:24px;font-weight:700;color:var(--xd);line-height:1.35;margin-top:10px}
.welcome-card p{font-size:14px;color:var(--g4);margin-top:8px;line-height:1.5}
.welcome-hint{display:inline-flex;align-items:center;gap:8px;margin-top:18px;font-size:14px;font-weight:700;color:white;background:linear-gradient(135deg,var(--xd),var(--xc));padding:11px 22px;border-radius:24px;box-shadow:0 4px 14px rgba(27,67,50,.22)}
@media(max-width:600px){.welcome-arrow{display:none}.welcome-card{padding:30px 24px}.welcome-card h2{font-size:20px}}
.spin{width:17px;height:17px;border:2px solid var(--g2);border-top-color:var(--xc);border-radius:50%;animation:sp .6s linear infinite;display:inline-block}
@keyframes sp{to{transform:rotate(360deg)}}
.loading{display:flex;align-items:center;justify-content:center;gap:8px;padding:40px;color:var(--g4);font-size:13px}
.gs-wrap{overflow:hidden;border-radius:var(--r);box-shadow:0 1px 4px rgba(0,0,0,.08);background:white;height:calc(100vh - 130px);min-height:400px}
.gs-wrap iframe{width:100%;height:calc(100% + 90px);margin-top:-90px;border:none;display:block}
.toast{position:fixed;top:58px;right:14px;padding:10px 16px;border-radius:var(--r);font-size:13px;color:white;box-shadow:0 2px 10px rgba(0,0,0,.15);transform:translateX(110%);transition:.3s;z-index:200}
.toast.on{transform:translateX(0)}.toast.ok{background:#1b5e20}.toast.er{background:var(--red)}

/* ── Mobile: sidebar off-canvas + overlay ── */
.hamburger{display:none;background:var(--xp);border:none;color:var(--xd);font-size:20px;cursor:pointer;padding:5px 12px;margin-right:6px;border-radius:8px}
.only-m{display:none}
@media(min-width:769px){.sb-overlay{display:none!important}}
.sb-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:95}
.sb-overlay.on{display:block}
@media(max-width:768px){
  body{overflow:auto;height:auto}
  #app{height:auto;min-height:100vh}
  .sb{position:fixed;top:0;left:0;height:100%;width:min(var(--sw),84vw);z-index:100;
      transform:translateX(-105%);transition:transform .28s cubic-bezier(.4,0,.2,1);
      box-shadow:4px 0 20px rgba(0,0,0,.25)}
  .sb.open{transform:translateX(0)}
  .hamburger{display:flex;align-items:center;justify-content:center}
  .only-m{display:inline-flex!important}
  .only-d{display:none!important}
  .main{width:100%;overflow:visible}
  .topbar{position:sticky;top:0;z-index:90;padding:0 10px}
  .topbar-t{font-size:13px}
  .content{overflow:visible;padding:8px}
  .tw{max-height:none;-webkit-overflow-scrolling:touch}
  table.t th.th-n,table.t td.td-n{position:static}
  /* Điều khiển co giãn cho ngón tay */
  .qs-bar{padding:10px 12px}
  .qs-bar .sel{padding:9px 10px;font-size:14px}
  .sel{padding:9px 10px}
  .btn-add,.btn-sm{padding:9px 14px}
  .ky-box{max-width:none}
  .ky-r .c-name{padding:10px 12px}
  .cmp-form{gap:6px}
  .cmp-form .sel{flex:1;min-width:120px}
  .btn-view{max-width:none}
  .welcome{min-height:auto;padding:20px 10px}
  .welcome-card{padding:26px 20px}
  .welcome-card h2{font-size:18px}
  .toast{left:8px;right:8px;top:54px}
}
</style>
</head>
<body>
<div id="sb-overlay" class="sb-overlay" onclick="XEM.closeSidebar()"></div>
<div id="app">
  <aside class="sb" id="sb">
    <div class="sb-head">
      <div class="sb-logo"><span class="i">📊</span>
        <div class="t">Xem báo cáo<br><span style="opacity:.55;font-weight:400">Sở NN và MT</span></div>
      </div>
      <div class="sb-user"><div class="n" id="sb-name"></div><div class="r" id="sb-role"></div></div>
    </div>
    <nav class="sb-nav" id="sb-nav"><div class="loading"><span class="spin"></span> Đang tải...</div></nav>
    <div class="sb-foot">
      <button class="sb-btn back" onclick="location.href='index.html'">↩ Quay lại nhập liệu</button>
    </div>
  </aside>

  <main class="main">
    <div class="topbar">
      <button class="hamburger" onclick="XEM.toggleSidebar()">☰</button>
      <div class="topbar-t" id="topbar-t">Chọn bảng báo cáo bên trái để xem</div>
      <div id="topbar-actions" style="display:flex;align-items:center;gap:6px;flex-shrink:0"></div>
    </div>
    <div class="content" id="content">
      <div class="welcome">
        <div class="welcome-arrow">←</div>
        <div class="welcome-card">
          <div class="welcome-ico">📊</div>
          <h2>Chọn một bảng báo cáo để bắt đầu</h2>
          <p>Danh sách các bảng bạn được phép xem nằm ở thanh bên trái.<br>Bấm vào một bảng để chọn kỳ và so sánh số liệu.</p>
          <div class="welcome-hint only-d">👈 Chọn bảng ở thanh bên trái</div>
          <button class="welcome-hint only-m" style="border:none;cursor:pointer;font-family:var(--font)" onclick="XEM.toggleSidebar()">📋 Bấm để mở danh sách bảng</button>
        </div>
      </div>
    </div>
  </main>
</div>
<div class="toast" id="toast"></div>

<script>
const XEM = {
  user:null, dsBang:[], allKy:[], namLoc:'all',
  bangHT:null, bObj:null, ct:[], idx:{}, daXem:false,
  checkedKy:new Set(),             // các kỳ đang tick trong danh sách (chưa thêm)
  selectedKy:[], comparisons:[],   // đã thêm vào biểu; comparisons = [{tu, mau}]
  wOverride:{},                    // độ rộng cột kéo tay — CHỈ lưu trong phiên, không ghi SQL
  _resizing:null,

  async init(){
    // ── Bảo vệ: phải đăng nhập ──
    const sv = UTILS.laySession();
    if(!sv){ location.replace('index.html'); return; }
    this.user = sv;

    document.title = 'Xem báo cáo – ' + (CONFIG.TEN_CO_QUAN||'');
    UTILS.el('sb-name').textContent = this.user.don_vi || this.user.ho_ten || '';
    UTILS.el('sb-role').textContent = this.user.vai_tro==='admin' ? '⚙️ Quản trị viên' : '👁️ Xem báo cáo';

    try{
      [this.dsBang, this.allKy] = await Promise.all([
        this.user.vai_tro==='admin' ? DB.layTatCaBang() : DB.layBangDuocPhep(this.user.id),
        DB.layTatCaKy()   // toàn bộ kỳ, sẽ lọc theo năm ở giao diện
      ]);
    }catch(e){
      UTILS.el('sb-nav').innerHTML = `<div style="padding:12px;color:#ffb4a2;font-size:12px">Lỗi tải dữ liệu: ${e.message}</div>`;
      return;
    }
    // Sắp xếp kỳ từ LỚN đến NHỎ theo thứ tự kỳ (thu_tu_hien_thi), fallback năm*100+tháng
    this.allKy.sort((a,b)=> this._khoaThuTu(b) - this._khoaThuTu(a));

    // Mặc định lọc theo năm mới nhất có dữ liệu kỳ
    const nams = [...new Set(this.allKy.map(k=>k.nam_bao_cao))].sort((a,b)=>b-a);
    this.namLoc = nams.length ? String(nams[0]) : 'all';
    // Nạp độ rộng cột đã kéo trong phiên (sessionStorage — không đụng Supabase)
    try{ this.wOverride = JSON.parse(sessionStorage.getItem('xembc_w')) || {}; }catch(e){ this.wOverride = {}; }
    this.buildSidebar();
  },

  // ── CHỌN NHANH: bộ kỳ mặc định theo tháng x, năm yyyy do người dùng chọn ──
  // Quy tắc mã kỳ theo trang admin: {prefix}_{MM}/{yyyy} với prefix:
  //   uoc = Ước thực hiện | uoclk = Ước lũy kế | ct = Chính thức | lkct = Lũy kế chính thức
  // Bộ cột: ct (x-1)/yyyy (x=1 → ct 12/(yyyy-1)); uoc x/yyyy; uoclk x/yyyy;
  //         cùng kỳ năm trước: ct x/(yyyy-1); lkct x/(yyyy-1).
  // So sánh: uoc x/yyyy ÷ ct x/(yyyy-1); uoclk x/yyyy ÷ lkct x/(yyyy-1). Thiếu kỳ nào bỏ qua.
  timBoKyMacDinh(x, yyyy){
    const chuan = s=>(s||'').trim().toLowerCase();
    // Khớp ƯU TIÊN theo mã kỳ đúng quy tắc admin (không phân biệt hoa thường,
    // chấp nhận tháng có/không đệm 0); DỰ PHÒNG khớp loại + tháng + năm cho dữ liệu cũ.
    const tim = (prefixes, loais, thang, nam)=>{
      const t2 = String(thang).padStart(2,'0');
      const maHopLe = prefixes.flatMap(p=>[`${p}_${t2}/${nam}`, `${p}_${thang}/${nam}`]);
      const ds = this.allKy.filter(k=>{
        if(maHopLe.includes(chuan(k.ky_bao_cao))) return true;
        return loais.includes(chuan(k.loai_so_lieu))
          && Number(k.thang_bao_cao)===thang && Number(k.nam_bao_cao)===nam;
      });
      if(!ds.length) return null;
      return ds.reduce((a,b)=> this._khoaThuTu(a)>=this._khoaThuTu(b)?a:b).ky_bao_cao;
    };
    const ct1   = (x>1) ? tim(['ct'],['chính thức'], x-1, yyyy) : tim(['ct'],['chính thức'], 12, yyyy-1);
    const uoc   = tim(['uoc'],   ['ước thực hiện'], x, yyyy);
    const uoclk = tim(['uoclk'], ['ước lũy kế'],    x, yyyy);
    const ct0   = tim(['ct'],    ['chính thức'],    x, yyyy-1);
    const lk0   = tim(['lkct','lk'], ['lũy kế chính thức','lũy kế'], x, yyyy-1);
    const ky = this._thuTuTang([ct1, uoc, uoclk, ct0, lk0].filter(Boolean));
    const ss = [];
    if(uoc   && ct0) ss.push({tu:uoc,   mau:ct0});
    if(uoclk && lk0) ss.push({tu:uoclk, mau:lk0});
    ss.sort((a,b)=> this._khoaThuTu(this._kyObj(a.tu)) - this._khoaThuTu(this._kyObj(b.tu)));
    return {ky, ss};
  },

  async apDungChonNhanh(){
    const x = Number(UTILS.el('qs-thang').value), yyyy = Number(UTILS.el('qs-nam').value);
    const {ky, ss} = this.timBoKyMacDinh(x, yyyy);
    if(!ky.length){ UTILS.toast(`Không tìm thấy kỳ nào phù hợp cho tháng ${x}/${yyyy}.`,'er'); return; }
    this.selectedKy = ky;          // thay thế lựa chọn hiện tại
    this.comparisons = ss;
    this.checkedKy.clear();
    this.buildKyList(); this.buildCmpSelects(); this.renderChips();
    UTILS.toast(`⚡ Đã chọn ${ky.length} kỳ + ${ss.length} so sánh cho tháng ${x}/${yyyy}${ky.length<5?' (kỳ thiếu đã bỏ qua)':''}.`,'ok');
    this.daXem = true;
    await this.taiDuLieu();
  },

  _khoaThuTu(k){
    const t = k.thu_tu_hien_thi;
    if(t!==null && t!==undefined && t!=='') return Number(t);
    return (Number(k.nam_bao_cao)||0)*100 + (Number(k.thang_bao_cao)||0);
  },

  buildSidebar(){
    const nav = UTILS.el('sb-nav');
    if(!this.dsBang.length){
      nav.innerHTML = `<div style="padding:10px;color:rgba(255,255,255,.4);font-size:12px">Chưa được phân công bảng nào.</div>`;
      return;
    }
    nav.innerHTML = `<div class="nlbl">📋 Bảng báo cáo được phép xem</div>` +
      this.dsBang.map(b=>`<div class="ni" id="nx-${b.bang}" onclick="XEM.chonBang('${b.bang}')"><span class="i">📄</span><span>${b.ten_bang}</span></div>`).join('');
  },

  toggleSidebar(){
    UTILS.el('sb')?.classList.toggle('open');
    UTILS.el('sb-overlay')?.classList.toggle('on');
  },

  // Chuyển mọi dạng link Google Sheet → dạng nhúng được (giữ nguyên nếu đã là dạng nhúng)
  _gsEmbed(url){
    if(!url)return'';
    url=String(url).trim();
    if(/\/pubhtml|output=html|\/htmlview|\/preview/.test(url)) return url;
    const gid=(url.match(/[#?&]gid=(\d+)/)||[])[1];
    const m=url.match(/\/spreadsheets\/d\/(e\/)?([\w-]+)/);
    if(m) return `https://docs.google.com/spreadsheets/d/${m[1]||''}${m[2]}/htmlview${gid?`?gid=${gid}#gid=${gid}`:''}`;
    return url;
  },
  closeSidebar(){
    UTILS.el('sb')?.classList.remove('open');
    UTILS.el('sb-overlay')?.classList.remove('on');
  },

  async chonBang(maBang){
    this.closeSidebar();
    this.bangHT = maBang;
    document.querySelectorAll('.ni').forEach(e=>e.classList.remove('act'));
    UTILS.el('nx-'+maBang)?.classList.add('act');
    const b = this.dsBang.find(x=>x.bang===maBang);
    this.bObj = b;
    UTILS.el('topbar-t').innerHTML = `${b?.ten_bang||maBang}<span class="topbar-s"> / ${b?.don_vi_bao_cao||''}</span>`;
    UTILS.el('topbar-actions').innerHTML = '';

    // Bảng dùng Google Sheet → không có số liệu CSDL để so sánh
    if(b?.gsheet_url){
      UTILS.el('content').innerHTML = `
        <div class="empty" style="padding:24px"><span class="i">📈</span>
          <span>Bảng này hiển thị bằng Google Sheet, không có số liệu trong cơ sở dữ liệu để so sánh.</span>
          <a href="${b.gsheet_url.trim()}" target="_blank" rel="noopener" style="font-size:12px;color:var(--xc);font-weight:600">🔗 Mở trong Google Sheet</a></div>
        <div class="gs-wrap"><iframe src="${this._gsEmbed(b.gsheet_url)}" allowfullscreen loading="lazy"></iframe></div>`;
      return;
    }

    UTILS.el('content').innerHTML = `<div class="loading"><span class="spin"></span> Đang tải chỉ tiêu...</div>`;
    try{
      this.ct = await DB.layChiTieuTheoBang(maBang);
    }catch(e){
      UTILS.el('content').innerHTML = `<div class="empty"><span class="i">⚠️</span><span>Lỗi: ${e.message}</span></div>`;
      return;
    }
    // Kỳ là toàn cục nên giữ nguyên lựa chọn khi đổi bảng
    this.renderShell(b);
    if(this.selectedKy.length || this.comparisons.length){
      this.daXem = true;           // đã có bộ cột (mặc định hoặc tự chọn) → hiển thị ngay
      await this.taiDuLieu();
    }else{
      UTILS.el('tw-area').innerHTML = `<div class="empty"><span class="i">👆</span><span>Chọn kỳ báo cáo, rồi bấm <b>Xem biểu</b> để hiển thị số liệu.</span></div>`;
    }
  },

  // Khung điều khiển + vùng bảng
  renderShell(b){
    UTILS.el('content').innerHTML = `
      <div class="sec">
        <div class="qs-bar">
          <span class="qs-lbl">⚡ Chọn nhanh kỳ báo cáo:</span>
          <span>Tháng</span> <select class="sel" id="qs-thang"></select>
          <span>Năm</span> <select class="sel" id="qs-nam"></select>
          <button class="btn-add" onclick="XEM.apDungChonNhanh()">Áp dụng</button>
          <span class="qs-hint">Tự chọn: CT tháng trước · Ước tháng · Ước lũy kế · CT &amp; Lũy kế cùng kỳ năm trước + 2 so sánh (kỳ thiếu sẽ bỏ qua)</span>
        </div>
        <div class="ctrl-row" style="align-items:center;gap:14px;margin-bottom:12px">
          <div class="ctrl-block">
            <div class="ctrl-lbl">📅 Năm báo cáo</div>
            <select class="sel" id="sel-nam" onchange="XEM.doiNam(this.value)"></select>
          </div>
          <div class="ctrl-note" style="flex:1;min-width:200px">📄 Đang xem: <b>${b?.ten_bang||''}</b> — đổi bảng ở thanh bên trái bất cứ lúc nào.</div>
        </div>
        <div class="sec-title"><span class="num">1</span> Chọn kỳ báo cáo <b id="cnt-ky" style="color:var(--xc);font-weight:700"></b></div>
        <div class="ky-box">
          <div class="ky-box-h"><div class="c-chk">Chọn</div><div class="c-name">Tên kỳ (sắp xếp mới → cũ)</div></div>
          <div class="ky-list" id="ky-list"></div>
        </div>
        <div style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap">
          <button class="btn-add" id="btn-add-ky" onclick="XEM.themVaoBieu()">➕ Thêm vào biểu</button>
          <button class="btn-sm gr" onclick="XEM.chonHetKy()">Chọn tất cả (năm này)</button>
          <button class="btn-sm gr" onclick="XEM.boChonHetKy()">Bỏ tick</button>
        </div>
      </div>

      <div class="sec">
        <div class="sec-title"><span class="num">2</span> So sánh tỷ lệ giữa 2 kỳ &nbsp;<span style="text-transform:none;font-weight:500;color:var(--g4)">(Kỳ A ÷ Kỳ B × 100%)</span></div>
        <div class="cmp-form">
          <select class="sel" id="cmp-tu" title="Kỳ A (tử số)"></select>
          <span class="op">÷</span>
          <select class="sel" id="cmp-mau" title="Kỳ B (mẫu số)"></select>
          <span class="op" style="color:var(--g4);font-size:14px">× 100%</span>
          <button class="btn-add" id="btn-add-cmp" onclick="XEM.themSoSanh()">➕ Thêm so sánh</button>
        </div>
      </div>

      <div class="sec">
        <div class="sec-title"><span class="num">3</span> Các cột sẽ hiển thị trong biểu</div>
        <div class="chip-strip" id="chip-strip"></div>
      </div>

      <div class="view-bar">
        <button class="btn-view" id="btn-view" onclick="XEM.xemBieu()">📊 Xem biểu</button>
      </div>

      <div class="tieu-de-bang" id="tdb" style="margin-top:12px">
        <div class="d1">${b?.tieu_de_chinh||b?.ten_bang?.toUpperCase()||''}</div>
        <div class="d2">${b?.tieu_de_phu||''}</div>
      </div>
      <div id="tw-area"></div>`;

    UTILS.el('topbar-actions').innerHTML = `<button class="btn-sm gr" onclick="XEM.xuatExcel()">📥 Xuất Excel</button>`;
    this.buildNamOptions();
    this.buildChonNhanh();
    this.buildKyList();
    this.buildCmpSelects();
    this.renderChips();
  },

  buildNamOptions(){
    const nams = [...new Set(this.allKy.map(k=>k.nam_bao_cao))].sort((a,b)=>b-a);
    const sel = UTILS.el('sel-nam');
    sel.innerHTML = `<option value="all">Tất cả năm</option>` +
      nams.map(n=>`<option value="${n}" ${String(n)===this.namLoc?'selected':''}>Năm ${n}</option>`).join('');
  },

  doiNam(v){ this.namLoc = v; this.buildKyList(); },

  // Điền dropdown chọn nhanh: tháng 1-12, năm theo dữ liệu; mặc định = kỳ mới nhất
  buildChonNhanh(){
    const selT = UTILS.el('qs-thang'), selN = UTILS.el('qs-nam');
    if(!selT) return;
    const nams = [...new Set(this.allKy.map(k=>Number(k.nam_bao_cao)))].sort((a,b)=>b-a);
    selN.innerHTML = nams.map(n=>`<option value="${n}">${n}</option>`).join('');
    selT.innerHTML = Array.from({length:12},(_,i)=>`<option value="${i+1}">${i+1}</option>`).join('');
    if(nams.length){
      const yMax = nams[0];
      const tMax = Math.max(...this.allKy.filter(k=>Number(k.nam_bao_cao)===yMax).map(k=>Number(k.thang_bao_cao)||1));
      selN.value = String(yMax); selT.value = String(tMax);
    }
  },

  kyTheoNam(){
    return this.namLoc==='all' ? this.allKy : this.allKy.filter(k=>String(k.nam_bao_cao)===String(this.namLoc));
  },

  // Danh sách kỳ dạng bảng có ô chọn (đã sắp xếp lớn→nhỏ ở allKy)
  buildKyList(){
    const box = UTILS.el('ky-list');
    const ds = this.kyTheoNam();
    if(!ds.length){ box.innerHTML = `<div class="ky-empty">Không có kỳ nào trong năm này.</div>`; }
    else{
      box.innerHTML = ds.map(k=>{
        const code = k.ky_bao_cao;
        const ticked = this.checkedKy.has(code);
        const added  = this.selectedKy.includes(code);
        const ten = k.ky_bao_cao_tieu_de || ('T'+k.thang_bao_cao+'/'+k.nam_bao_cao);
        return `<div class="ky-r ${ticked?'on':''} ${added?'added':''}" onclick="XEM.tickKy('${code}')" title="${code}">
          <div class="c-chk"><span class="ky-cb">${ticked?'✓':''}</span></div>
          <div class="c-name">${k.khoa_nhap_lieu?'<span class="lock">🔒</span>':''}${ten}
            ${added?'<span class="added-badge">đã thêm</span>':''}</div>
        </div>`;
      }).join('');
    }
    const n = this.checkedKy.size;
    UTILS.el('cnt-ky').textContent = n ? `— đang tick ${n} kỳ` : '';
    const btn = UTILS.el('btn-add-ky'); if(btn) btn.disabled = n===0;
  },

  tickKy(code){
    if(this.checkedKy.has(code)) this.checkedKy.delete(code);
    else this.checkedKy.add(code);
    this.buildKyList();
  },

  chonHetKy(){ this.kyTheoNam().forEach(k=>this.checkedKy.add(k.ky_bao_cao)); this.buildKyList(); },
  boChonHetKy(){ this.checkedKy.clear(); this.buildKyList(); },

  // "Thêm vào biểu": chuyển các kỳ đang tick thành cột hiển thị
  themVaoBieu(){
    if(!this.checkedKy.size){ UTILS.toast('Chưa tick kỳ nào.','er'); return; }
    this.selectedKy = this._thuTuTang([...this.selectedKy, ...this.checkedKy]);
    this.checkedKy.clear();
    this.buildKyList();
    this.buildCmpSelects();   // so sánh chỉ chọn trong các kỳ đã thêm
    this.renderChips();
    if(this.daXem) this.taiDuLieu();
    UTILS.toast('✅ Đã thêm kỳ vào biểu.','ok');
  },

  _kyObj(code){ return this.allKy.find(k=>k.ky_bao_cao===code) || {}; },

  // Sắp xếp mã kỳ theo SỐ THỨ TỰ KỲ TĂNG DẦN (nhỏ→lớn, trái→phải)
  _thuTuTang(codes){
    return [...new Set(codes)].sort((a,b)=> this._khoaThuTu(this._kyObj(a)) - this._khoaThuTu(this._kyObj(b)));
  },

  // Dropdown so sánh: CHỈ các kỳ đã thêm ở bước 1
  buildCmpSelects(){
    const tuEl = UTILS.el('cmp-tu'), mauEl = UTILS.el('cmp-mau'), btn = UTILS.el('btn-add-cmp');
    if(!tuEl) return;
    const ds = this.selectedKy;  // đã sắp xếp tăng dần
    if(ds.length < 2){
      const msg = ds.length ? 'Cần thêm ≥ 2 kỳ ở bước 1' : 'Chưa có kỳ nào ở bước 1';
      tuEl.innerHTML = mauEl.innerHTML = `<option value="">${msg}</option>`;
      tuEl.disabled = mauEl.disabled = true;
      if(btn) btn.disabled = true;
      return;
    }
    const opts = ds.map(code=>`<option value="${code}">${this._tenKy(code)}</option>`).join('');
    tuEl.innerHTML = mauEl.innerHTML = opts;
    tuEl.disabled = mauEl.disabled = false;
    if(btn) btn.disabled = false;
    // mặc định: tử = kỳ mới nhất, mẫu = kỳ liền trước
    tuEl.value  = ds[ds.length-1];
    mauEl.value = ds[ds.length-2];
  },

  themSoSanh(){
    const tu = UTILS.el('cmp-tu').value, mau = UTILS.el('cmp-mau').value;
    if(!tu||!mau){ UTILS.toast('Hãy thêm kỳ ở bước 1 trước khi so sánh.','er'); return; }
    if(tu===mau){ UTILS.toast('Kỳ A và kỳ B phải khác nhau.','er'); return; }
    if(this.comparisons.some(c=>c.tu===tu&&c.mau===mau)){ UTILS.toast('Cột so sánh này đã có.','er'); return; }
    this.comparisons.push({tu,mau});
    // Sắp xếp cột so sánh theo thứ tự kỳ ở TỬ SỐ (tăng dần)
    this.comparisons.sort((a,b)=> this._khoaThuTu(this._kyObj(a.tu)) - this._khoaThuTu(this._kyObj(b.tu)));
    this.renderChips();
    if(this.daXem) this.taiDuLieu();
    UTILS.toast('✅ Đã thêm cột so sánh.','ok');
  },

  xoaKy(code){
    this.selectedKy = this.selectedKy.filter(c=>c!==code);
    // Bỏ luôn các cột so sánh có dùng kỳ vừa xóa (vì so sánh chỉ dùng kỳ đã thêm)
    const truoc = this.comparisons.length;
    this.comparisons = this.comparisons.filter(c=>c.tu!==code && c.mau!==code);
    if(this.comparisons.length!==truoc) UTILS.toast('Đã bỏ cột so sánh liên quan đến kỳ vừa xóa.','ok');
    this.buildKyList(); this.buildCmpSelects(); this.renderChips();
    if(this.daXem) this.taiDuLieu();
  },

  xoaSoSanh(i){
    this.comparisons.splice(i,1);
    this.renderChips();
    if(this.daXem) this.taiDuLieu();
  },

  // Strip "các cột sẽ hiển thị"
  renderChips(){
    const el = UTILS.el('chip-strip');
    if(!el) return;
    if(!this.selectedKy.length && !this.comparisons.length){
      el.innerHTML = `<span class="chip-none">Chưa có cột nào. Tick kỳ ở mục 1 rồi bấm "Thêm vào biểu", hoặc thêm cột so sánh ở mục 2.</span>`;
      return;
    }
    let h = this.selectedKy.map(code=>
      `<span class="chip ky">${this._tenKy(code)}<span class="x" onclick="XEM.xoaKy('${code}')">×</span></span>`
    ).join('');
    h += this.comparisons.map((c,i)=>
      `<span class="chip cmp">${this._tenKy(c.tu)} ÷ ${this._tenKy(c.mau)} × 100%<span class="x" onclick="XEM.xoaSoSanh(${i})">×</span></span>`
    ).join('');
    el.innerHTML = h;
  },

  _tenKy(code){
    const k = this.allKy.find(x=>x.ky_bao_cao===code);
    return k ? (k.ky_bao_cao_tieu_de||code) : code;
  },

  // Nút "Xem biểu"
  async xemBieu(){
    if(!this.selectedKy.length && !this.comparisons.length){
      UTILS.toast('Hãy thêm ít nhất một kỳ hoặc một cột so sánh.','er'); return;
    }
    this.daXem = true;
    await this.taiDuLieu();
  },

  // Tải dữ liệu cho tất cả kỳ đang dùng (hiển thị + so sánh)
  async taiDuLieu(){
    const tw = UTILS.el('tw-area');
    if(!tw) return;
    const canDung = [...new Set([
      ...this.selectedKy,
      ...this.comparisons.flatMap(c=>[c.tu,c.mau])
    ])];
    if(!canDung.length){
      tw.innerHTML = `<div class="empty"><span class="i">👆</span><span>Chọn ít nhất một kỳ báo cáo phía trên để xem số liệu.</span></div>`;
      return;
    }
    tw.innerHTML = `<div class="tw"><div class="loading"><span class="spin"></span> Đang tải số liệu...</div></div>`;
    try{
      const dl = await DB.layDuLieu(this.bangHT, canDung);
      this.idx = {};
      dl.forEach(r=>{ this.idx[`${r.id_chi_tieu}|${r.ky_bao_cao}`] = r; });
      this.renderBang();
    }catch(e){
      tw.innerHTML = `<div class="empty"><span class="i">⚠️</span><span>Lỗi tải số liệu: ${e.message}</span></div>`;
    }
  },

  // Độ rộng cột: ưu tiên giá trị đã kéo tay trong phiên, nếu không thì mặc định
  _wCot(key, def){
    const v = this.wOverride[key];
    return (v!=null) ? v : def;
  },

  // Bắt đầu kéo giãn cột: thao tác trực tiếp trên <col> nên CHỈ cột bị kéo thay đổi
  startResize(e, key){
    e.preventDefault(); e.stopPropagation();
    const tbl = document.getElementById('bang-xem');
    const col = tbl ? tbl.querySelector(`col[data-key="${key}"]`) : null;
    if(!col) return;
    this._resizing = { col, tbl, key, startX:e.clientX,
      startW:parseInt(col.style.width)||100, startTW:parseInt(tbl.style.width)||tbl.offsetWidth };
    document.body.classList.add('resizing');
    document.addEventListener('pointermove', this._onResize);
    document.addEventListener('pointerup', this._endResize);
  },
  _onResize(e){
    const r = XEM._resizing; if(!r) return;
    const w = Math.max(56, r.startW + e.clientX - r.startX);
    // Chỉ đổi <col> bị kéo + tổng width của bảng; các cột khác giữ nguyên tuyệt đối
    r.col.style.width = w+'px';
    r.tbl.style.width = (r.startTW - r.startW + w)+'px';
  },
  _endResize(e){
    const r = XEM._resizing; if(!r) return;
    document.removeEventListener('pointermove', XEM._onResize);
    document.removeEventListener('pointerup', XEM._endResize);
    document.body.classList.remove('resizing');
    const w = Math.max(56, r.startW + e.clientX - r.startX);
    XEM.wOverride[r.key] = w;
    // Lưu tạm vào sessionStorage: giữ khi F5, mất khi đóng tab, KHÔNG ghi Supabase
    try{ sessionStorage.setItem('xembc_w', JSON.stringify(XEM.wOverride)); }catch(err){}
    XEM._resizing = null;
  },

  _rsz(key){ return `<div class="resize-handle" onpointerdown="XEM.startResize(event,'${key}')" title="Kéo để đổi độ rộng cột"></div>`; },

  renderBang(){
    if(!this.ct.length){
      UTILS.el('tw-area').innerHTML = `<div class="empty"><span class="i">📑</span><span>Bảng này chưa có chỉ tiêu nào.</span></div>`;
      return;
    }
    const kyInfo = code => this.allKy.find(k=>k.ky_bao_cao===code);
    // Độ rộng cột: mặc định lấy từ CSDL giống trang nhập liệu (280/70/120);
    // nếu người dùng đã kéo tay thì ưu tiên giá trị lưu trong phiên (this.wOverride)
    const b = this.bObj || {}, mb = this.bangHT;
    const dsCol = [
      {key:'stt', w:46, rsz:false},
      {key:'ten:'+mb, w:this._wCot('ten:'+mb, b.do_rong_ten || 280), rsz:true},
      {key:'dvt:'+mb, w:this._wCot('dvt:'+mb, b.do_rong_dvt || 70),  rsz:true},
    ];
    this.selectedKy.forEach(code=>{
      const k = kyInfo(code);
      dsCol.push({key:'ky:'+code, w:this._wCot('ky:'+code, (k && k.do_rong_cot) || 120), rsz:true});
    });
    this.comparisons.forEach(c=>{
      dsCol.push({key:'cmp:'+c.tu+'|'+c.mau, w:this._wCot('cmp:'+c.tu+'|'+c.mau, 128), rsz:true});
    });
    const tongW = dsCol.reduce((s,c)=>s+c.w, 0);
    const colgroup = '<colgroup>' + dsCol.map(c=>`<col data-key="${c.key}" style="width:${c.w}px">`).join('') + '</colgroup>';

    // ── Header (độ rộng do colgroup quyết định) ──
    let th = `<tr>
      <th class="th-stt">STT</th>
      <th class="th-n">Tên chỉ tiêu${this._rsz('ten:'+mb)}</th>
      <th class="th-u">ĐVT${this._rsz('dvt:'+mb)}</th>`;
    this.selectedKy.forEach(code=>{
      const k = kyInfo(code);
      th += `<th class="th-ky" title="${code}">${k?(k.ky_bao_cao_tieu_de||('T'+k.thang_bao_cao+'/'+k.nam_bao_cao)):code}${this._rsz('ky:'+code)}</th>`;
    });
    this.comparisons.forEach(c=>{
      const key = 'cmp:'+c.tu+'|'+c.mau;
      th += `<th class="th-cmp" title="${this._tenKy(c.tu)} / ${this._tenKy(c.mau)} × 100%">
        ${this._tenKy(c.tu)}<br><span style="opacity:.75;font-weight:400">÷ ${this._tenKy(c.mau)} × 100%</span>${this._rsz(key)}</th>`;
    });
    th += `</tr>`;

    // ── Body ──
    let tb = '';
    this.ct.forEach(c=>{
      // Bỏ qua dòng không có tên chỉ tiêu (dòng đệm dùng cho nhập liệu) — tránh dòng trống lạ
      if(!(c.chi_tieu||'').replace(/\u00a0/g,' ').trim()) return;
      const ind = UTILS.demKhoang(c.chi_tieu)*4;
      const stt = (c.stt_hien_thi!=null&&c.stt_hien_thi!=='') ? c.stt_hien_thi : '';
      const isText = c.kieu_du_lieu==='text';

      if(c.la_tieu_de){
        const cols = this.selectedKy.length + this.comparisons.length;
        tb += `<tr class="tr-h"><td class="td-stt">${stt}</td>
          <td class="td-n" style="padding-left:${ind+10}px">${c.chi_tieu.trim()}</td>
          <td class="td-u"></td>${'<td></td>'.repeat(cols)}</tr>`;
        return;
      }

      let cells = '';
      this.selectedKy.forEach(code=>{
        const v = this.idx[`${c.id}|${code}`]?.gia_tri;
        const has = v!==null&&v!==undefined&&v!=='';
        const disp = has ? (isText ? v : UTILS.formatSo(v)) : '–';
        cells += `<td class="td-val ${has?'':'no-val'}" style="${isText?'text-align:left':''}">${disp}</td>`;
      });
      this.comparisons.forEach(cp=>{
        cells += this._oSoSanh(c, cp, isText);
      });
      tb += `<tr><td class="td-stt">${stt}</td>
        <td class="td-n" style="padding-left:${ind+10}px">${c.chi_tieu.trim()}</td>
        <td class="td-u">${c.don_vi||''}</td>${cells}</tr>`;
    });

    UTILS.el('tw-area').innerHTML = `<div class="tw"><table class="t" id="bang-xem" style="table-layout:fixed;width:${tongW}px;min-width:0">${colgroup}<thead>${th}</thead><tbody>${tb}</tbody></table></div>`;
  },

  // Ô tỷ lệ % = giá trị(tu) / giá trị(mau) × 100
  _oSoSanh(c, cp, isText){
    if(isText) return `<td class="td-cmp na">–</td>`;
    const tu  = this.idx[`${c.id}|${cp.tu}`]?.gia_tri;
    const mau = this.idx[`${c.id}|${cp.mau}`]?.gia_tri;
    const tuN = (tu===null||tu===undefined||tu==='') ? null : Number(tu);
    const mauN = (mau===null||mau===undefined||mau==='') ? null : Number(mau);
    if(tuN===null || mauN===null || mauN===0 || isNaN(tuN) || isNaN(mauN)){
      return `<td class="td-cmp na" title="Thiếu số liệu hoặc mẫu số = 0">–</td>`;
    }
    const pct = tuN/mauN*100;
    const cls = pct>100 ? 'up' : (pct<100 ? 'down' : '');
    return `<td class="td-cmp ${cls}">${UTILS.formatSo(Math.round(pct*10)/10)}%</td>`;
  },

  // ── Xuất Excel bảng đang xem ──
  xuatExcel(){
    if(typeof XLSX==='undefined'){ UTILS.toast('Thiếu thư viện XLSX','er'); return; }
    if(!this.ct.length){ UTILS.toast('Chưa có dữ liệu để xuất','er'); return; }
    const kyInfo = code => this.allKy.find(k=>k.ky_bao_cao===code);
    const headers = ['STT','Tên chỉ tiêu','ĐVT',
      ...this.selectedKy.map(code=>{const k=kyInfo(code);return k?(k.ky_bao_cao_tieu_de||code):code;}),
      ...this.comparisons.map(c=>`${this._tenKy(c.tu)} / ${this._tenKy(c.mau)} (%)`)
    ];
    const rows = [];
    this.ct.forEach(c=>{
      if(!(c.chi_tieu||'').replace(/\u00a0/g,' ').trim()) return;   // bỏ dòng đệm không tên
      const stt=(c.stt_hien_thi!=null&&c.stt_hien_thi!=='')?c.stt_hien_thi:'';
      if(c.la_tieu_de){ rows.push([stt, c.chi_tieu.trim(), '', ...Array(this.selectedKy.length+this.comparisons.length).fill('')]); return; }
      const isText=c.kieu_du_lieu==='text';
      const vals=this.selectedKy.map(code=>{
        const v=this.idx[`${c.id}|${code}`]?.gia_tri;
        return (v===null||v===undefined||v==='')?'':(isText?v:Number(v));
      });
      const cmps=this.comparisons.map(cp=>{
        if(isText) return '';
        const tu=this.idx[`${c.id}|${cp.tu}`]?.gia_tri, mau=this.idx[`${c.id}|${cp.mau}`]?.gia_tri;
        const tuN=(tu===''||tu==null)?null:Number(tu), mauN=(mau===''||mau==null)?null:Number(mau);
        if(tuN===null||mauN===null||mauN===0) return '';
        return Math.round(tuN/mauN*1000)/10;
      });
      rows.push([stt, c.chi_tieu.trim(), c.don_vi||'', ...vals, ...cmps]);
    });
    const ws = XLSX.utils.aoa_to_sheet([headers, ...rows]);
    const range = XLSX.utils.decode_range(ws['!ref']);
    for(let C=range.s.c;C<=range.e.c;C++){
      const addr=XLSX.utils.encode_cell({r:0,c:C});
      if(ws[addr]) ws[addr].s={font:{bold:true,color:{rgb:'FFFFFF'}},fill:{fgColor:{rgb:'1B4332'}}};
    }
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Bao cao');
    const b = this.dsBang.find(x=>x.bang===this.bangHT);
    XLSX.writeFile(wb, `XemBaoCao_${b?.ten_bang||this.bangHT}.xlsx`);
    UTILS.toast('📥 Đã xuất Excel!','ok');
  },
};
window.addEventListener('load',()=>XEM.init());
</script>
</body>
</html>
